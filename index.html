<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relais Célébrations - H@B</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075E54">
    <style>
        :root { --wa-green: #075E54; --bg-chat: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-chat); display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--wa-green); color: white; padding: 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #qr-view { display: none; background: white; padding: 20px; text-align: center; border-bottom: 3px solid #25D366; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { background: white; padding: 12px; border-radius: 10px; max-width: 85%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-size: 14px; line-height: 1.4; }
        .system-msg { background: #e3f2fd; text-align: center; align-self: center; font-size: 12px; border-radius: 5px; padding: 5px 10px; }
        .signature { text-align: center; font-size: 10px; padding: 8px; color: #777; background: #f0f0f0; }
        img.qr-img { width: 200px; border: 5px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<header>CÉLÉBRATIONS - Relais H@B</header>

<div id="qr-view">
    <p style="margin-top:0;"><b>Scannez pour connecter WhatsApp</b></p>
    <div id="qrcode-container"></div>
</div>

<div id="chat-container">
    <div class="message system-msg">Démarrage du bot en cours...</div>
</div>

<div class="signature">Développé par <b>H@B</b></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const qrView = document.getElementById('qr-view');
    const qrContainer = document.getElementById('qrcode-container');
    const chatContainer = document.getElementById('chat-container');

    // Réception de l'image du QR Code
    socket.on('qr_image', (url) => {
        qrView.style.display = 'block';
        // Utilisation des backticks pour l'injection correcte de l'URL
        qrContainer.innerHTML = `<img src="${url}" class="qr-img" alt="QR Code WhatsApp">`;
    });

    // Quand le bot est prêt
    socket.on('ready', () => {
        qrView.style.display = 'none';
        const div = document.createElement('div');
        div.className = 'message system-msg';
        div.innerHTML = "<b>Statut :</b> Connecté à WhatsApp ! ✅";
        chatContainer.appendChild(div);
    });

    // Réception des messages
    socket.on('whatsapp_message', (data) => {
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `<b>${data.sender}</b><br>${data.body}`;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    });

    // Activation du Service Worker (sw.js)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker enregistré !'))
                .catch(err => console.log('Erreur SW:', err));
        });
    }
</script>
</body>
</html>
